version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - sellsnap

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - NODE_ENV=production
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sellsnap

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sellsnap}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sellsnap}
      - POSTGRES_DB=${POSTGRES_DB:-sellsnap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellsnap}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sellsnap

networks:
  sellsnap:
    driver: bridge

volumes:
  postgres_data:
