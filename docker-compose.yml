version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost
    ports:
      - "80:80"
    environment:
      - DATABASE_URL=postgresql://sellsnap:sellsnap@db:5432/sellsnap
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sellsnap

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sellsnap
      - POSTGRES_PASSWORD=sellsnap
      - POSTGRES_DB=sellsnap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellsnap"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sellsnap

networks:
  sellsnap:
    driver: bridge

volumes:
  postgres_data:
