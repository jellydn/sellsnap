<svg width="280" height="60" viewBox="0 0 280 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo icon group -->
  <g transform="translate(0, 0)">
    <!-- Lightning bolt replacing cart handle -->
    <path d="M22 10 L30 22 L25 22 L32 32 L15 19 L22 19 L17 10 Z"
          fill="url(#logoGradientH)"/>

    <!-- Shopping cart basket -->
    <path d="M16 22 L20 38 Q21 41 25 41 L37 41 Q41 41 42 38 L46 22 L16 22 Z"
          fill="url(#logoGradientH)"/>

    <!-- Cart wheels -->
    <circle cx="24" cy="47" r="4" fill="url(#logoGradientH)"/>
    <circle cx="36" cy="47" r="4" fill="url(#logoGradientH)"/>

    <!-- Cart front edge detail -->
    <path d="M22 25 L43 25 L40 37 L19 37 Z"
          fill="#3b82f6" opacity="0.4"/>
  </g>

  <!-- SellSnap text -->
  <text x="58" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif"
        font-size="28" font-weight="700" fill="#1e293b">
    Sell<tspan fill="#2563eb">Snap</tspan>
  </text>
</svg>
